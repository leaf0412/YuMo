[package]
name = "yumo-core"
version = "0.3.0"
edition = "2021"
description = "语墨核心库 - 业务逻辑与平台抽象"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
log = "0.4"
regex = "1"
rusqlite = { version = "0.31", features = ["bundled", "backup"] }
reqwest = { version = "0.12", features = ["stream", "json", "multipart"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
