<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#16103a"/>
      <stop offset="60%" stop-color="#251d5e"/>
      <stop offset="100%" stop-color="#2f2272"/>
    </linearGradient>
    <linearGradient id="brushGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="50%" stop-color="#e8ecff"/>
      <stop offset="70%" stop-color="#4a4570"/>
      <stop offset="85%" stop-color="#1a1632"/>
      <stop offset="100%" stop-color="#0f0d1a"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="brushShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0a0820" flood-opacity="0.4"/>
    </filter>
    <clipPath id="squircleClip">
      <rect x="32" y="32" width="960" height="960" rx="215" ry="215"/>
    </clipPath>
  </defs>

  <!-- macOS-style squircle background with margin -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#bg)"/>

  <!-- Subtle radial highlight -->
  <circle cx="480" cy="420" r="360" fill="#3730a3" opacity="0.08" clip-path="url(#squircleClip)"/>

  <g clip-path="url(#squircleClip)">
    <g filter="url(#softGlow)">
      <!-- Sound wave 1 -->
      <path d="M270 280 Q410 225 512 280 Q614 335 754 280"
            stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.2"/>
      <!-- Sound wave 2 -->
      <path d="M245 380 Q410 310 512 380 Q614 450 779 380"
            stroke="white" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.4"/>
      <!-- Sound wave 3 -->
      <path d="M220 485 Q410 408 512 485 Q614 562 804 485"
            stroke="white" stroke-width="30" fill="none" stroke-linecap="round" opacity="0.65"/>
    </g>

    <!-- Brush stroke — extends to edge, clipped by squircle -->
    <g filter="url(#brushShadow)">
      <path d="
        M 160 620
        Q 190 608 260 604
        C 370 594 480 588 560 596
        C 660 606 770 624 860 648
        C 930 668 990 690 1020 710
        Q 1030 716 1026 724
        Q 1022 732 1010 730
        C 960 724 890 712 860 700
        C 770 682 660 688 560 678
        C 480 670 370 670 260 668
        Q 190 666 164 656
        Q 152 650 154 640
        Q 156 624 160 620
        Z
      " fill="url(#brushGrad)"/>
    </g>
  </g>

  <!-- Ink splatter — outside the squircle, near bottom-right corner -->
  <circle cx="910" cy="880" r="22" fill="#1a1632" opacity="0.75"/>
  <circle cx="945" cy="915" r="14" fill="#1a1632" opacity="0.55"/>
  <circle cx="930" cy="945" r="9" fill="#0f0d1a" opacity="0.4"/>
  <circle cx="960" cy="950" r="6" fill="#1a1632" opacity="0.3"/>
</svg>
