name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            artifact_suffix: macos_aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
            artifact_suffix: macos_x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            artifact_suffix: windows_x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb,appimage
            artifact_suffix: linux_x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libpulse-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            cmake \
            build-essential

      - name: Install CMake (Windows)
        if: matrix.os == 'windows-latest'
        uses: lukka/get-cmake@latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Make uv executable (macOS)
        if: matrix.os == 'macos-latest'
        run: chmod +x src-tauri/resources/uv

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload NSIS installer (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload AppImage artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
