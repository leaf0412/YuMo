name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # =========================================================================
  # Tauri builds (macOS, Windows, Linux)
  # =========================================================================
  tauri:
    name: tauri (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb,appimage

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libpulse-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libssl-dev \
            cmake \
            build-essential \
            libdbus-1-dev \
            libxdo-dev \
            pkg-config

      - name: Install CMake (Windows)
        if: matrix.os == 'windows-latest'
        uses: lukka/get-cmake@latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            crates/yumo-core

      - name: Install frontend dependencies
        run: pnpm install

      - name: Make uv executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x src-tauri/resources/uv || true

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          echo "CFLAGS=-mmacosx-version-min=11.0" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-mmacosx-version-min=11.0" >> "$GITHUB_ENV"

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Collect artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p staging
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg staging/

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p staging
          cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe staging/

      - name: Collect artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p staging
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage staging/
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb staging/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: staging/*

  # =========================================================================
  # Electron build (Linux compat — for systems without WebKitGTK 4.1)
  # =========================================================================
  electron:
    name: electron (linux-compat)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse-dev \
            libsecret-1-dev \
            libasound2-dev \
            cmake \
            build-essential \
            libdbus-1-dev \
            libxdo-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/yumo-core
            napi

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build napi addon
        run: cargo build --release -p yumo-napi

      - name: Copy napi addon
        run: cp target/release/libyumo_napi.so napi/yumo-napi.linux-x64-gnu.node

      - name: Build frontend + Electron
        run: pnpm electron:build

      - name: Package Electron app
        run: pnpm electron-builder --linux AppImage deb --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            release/*-linux.AppImage
            release/*-linux.deb

  # =========================================================================
  # Publish all artifacts to GitHub Release
  # =========================================================================
  publish:
    name: publish
    needs: [tauri, electron]
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
