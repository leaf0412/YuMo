name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # =========================================================================
  # Tauri builds (macOS, Windows, Linux)
  # =========================================================================
  tauri:
    name: tauri (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb,appimage

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libpulse-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            cmake \
            build-essential \
            libdbus-1-dev \
            pkg-config

      - name: Install CMake (Windows)
        if: matrix.os == 'windows-latest'
        uses: lukka/get-cmake@latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            crates/yumo-core

      - name: Install frontend dependencies
        run: pnpm install

      - name: Make uv executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x src-tauri/resources/uv || true

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Upload DMG (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload NSIS installer (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload AppImage + deb (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  # =========================================================================
  # Electron build (Linux compat — for systems without WebKitGTK 4.1)
  # =========================================================================
  electron:
    name: electron (linux-compat)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse-dev \
            libsecret-1-dev \
            libasound2-dev \
            cmake \
            build-essential \
            libdbus-1-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/yumo-core
            napi

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build napi addon
        run: cargo build --release -p yumo-napi

      - name: Copy napi addon
        run: cp target/release/libyumo_napi.so napi/yumo-napi.linux-x64-gnu.node

      - name: Build frontend + Electron
        run: pnpm electron:build

      - name: Package Electron app
        run: pnpm electron-builder --linux AppImage deb

      - name: Upload Electron artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/*-linux.AppImage
            release/*-linux.deb
