name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libpulse-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            cmake \
            build-essential \
            libdbus-1-dev \
            pkg-config

      - name: Install CMake (Windows)
        if: matrix.os == 'windows-latest'
        uses: lukka/get-cmake@latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            crates/yumo-core
            napi

      - name: Install frontend dependencies
        run: pnpm install

      - name: Frontend build
        run: pnpm vite build

      # Rust checks — all platforms
      - name: Rust check (yumo-core)
        run: cargo check -p yumo-core

      - name: Rust tests (yumo-core)
        run: cargo test -p yumo-core

      - name: Rust check (yumo-napi)
        run: cargo check -p yumo-napi

      # Tauri — macOS only (depends on cocoa/objc)
      - name: Rust check (Tauri app)
        if: matrix.os == 'macos-latest'
        run: cargo check -p yumo

      - name: Rust tests (Tauri app)
        if: matrix.os == 'macos-latest'
        run: cargo test -p yumo

      # Electron main process build
      - name: Electron build check
        run: pnpm electron:build-main
