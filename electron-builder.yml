appId: com.yumo.electron
productName: YuMo
directories:
  buildResources: build
  output: release
files:
  - dist-electron/**/*
extraResources:
  - from: napi/
    to: napi/
    filter:
      - "*.node"
mac:
  target:
    - dmg
  artifactName: ${productName}-${version}-mac.${ext}
  category: public.app-category.utilities
linux:
  target:
    - AppImage
    - deb
  artifactName: ${productName}-${version}-linux.${ext}
  category: Utility
publish:
  provider: github
