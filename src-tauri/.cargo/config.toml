# whisper.cpp (via whisper-rs-sys) uses std::filesystem which requires macOS 10.15+.
# Xcode 26+ SDK strictly enforces C++ availability annotations, rejecting
# std::filesystem::path when -mmacosx-version-min < 10.15.
# The cmake crate picks up CFLAGS/CXXFLAGS from the environment, so we set
# them here to override the default 10.13 minimum inherited from rustc's target spec.
[env]
MACOSX_DEPLOYMENT_TARGET = "11.0"
CMAKE_OSX_DEPLOYMENT_TARGET = "11.0"
CFLAGS = "-mmacosx-version-min=11.0"
CXXFLAGS = "-mmacosx-version-min=11.0"
